spring:
  cloud:
    azure:
      credential:
        managed-identity-enabled: true
        client-id: ${AZURE_CLIENT_ID}
      keyvault:
        secret:
          property-source-enabled: true
          endpoint: https://az-cosmos-db1-keyvault.vault.azure.net/
          property-sources:
            - name: ${AZURE_KEYVAULT_NAME}
              endpoint: ${AZURE_KEYVAULT_ENDPOINT}