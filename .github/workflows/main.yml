name: Build Java App and Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    # ✅ Setup Java
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # ✅ Build JAR
    - name: Build with Maven
      run: mvn clean package -DskipTests

    # ✅ Build Docker Image (UPDATED NAME)
    - name: Build Docker Image
      run: |
        docker build -t accounts-services:${{ github.sha }} -t accounts-services:latest .

    # ✅ Save as TAR (UPDATED NAME)
    - name: Save Image as TAR
      run: |
        docker save accounts-services:${{ github.sha }} -o accounts-services.tar

    # ✅ Upload Artifact
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: accounts-services-image
        path: accounts-services.tar
