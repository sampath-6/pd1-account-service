name: Build Docker Image Artifact

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: maven

    - name: Make mvnw executable
      working-directory: account-service
      run: chmod +x mvnw

    - name: Build with Maven
      working-directory: account-service
      run: ./mvnw clean package -DskipTests

    - name: Verify JAR
      run: ls -l account-service/target

    - name: Build Docker Image
      working-directory: account-service
      run: docker build -t accounts-services:latest .

    - name: Save Docker Image
      run: docker save accounts-services:latest -o accounts-services.tar

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: accounts-services-image
        path: accounts-services.tar
