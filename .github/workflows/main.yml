name: Build Java App and Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # ✅ FIX

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Build Docker Image
      run: |
        docker build -t accounts-services:${{ github.sha }} -t accounts-services:latest .

    - name: Save Image as TAR
      run: |
        docker save accounts-services:${{ github.sha }} -o accounts-services.tar

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: accounts-services-image
        path: accounts-services.tar
