name: Build Docker Image Artifact

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: maven

    # ✅ Run Maven in correct folder
    - name: Build with Maven
      working-directory: account-service
      run: ./mvnw clean package -DskipTests

    # ✅ Verify JAR
    - name: Verify JAR
      run: ls -l account-service/target

    # ✅ Build Docker from correct folder
    - name: Build Docker Image
      working-directory: account-service
      run: docker build -t accounts-services:latest .

    # ✅ Save image
    - name: Save Docker Image
      run: docker save accounts-services:latest -o accounts-services.tar

    # ✅ Upload artifact
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: accounts-services-image
        path: accounts-services.tar
